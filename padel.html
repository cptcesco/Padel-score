<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=466, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Padel Score</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

  :root {
    --bg: #0a0a0f;
    --court: #0d1f12;
    --green: #00e676;
    --green-dim: #1a3d22;
    --amber: #ffab00;
    --white: #f0f0f0;
    --dim: #444;
    --red: #ff3d3d;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Courier New', monospace;
    touch-action: manipulation;
  }

  /* ── MAIN LAYOUT ── */
  #app {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── SET TRACKER ── */
  #sets {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    padding: 6px 0 4px;
    background: #0f0f18;
    border-bottom: 1px solid #1a1a2e;
  }

  .set-score {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
  }
  .set-score.active { color: var(--white); }
  .set-sep { color: #222; font-size: 10px; }

  /* ── SCORE PANELS ── */
  #panels {
    flex: 1;
    display: flex;
    flex-direction: row;
  }

  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: background 0.08s;
    padding: 8px 4px;
  }

  .panel:active { filter: brightness(1.3); }

  #p1 { background: #080d10; border-right: 1px solid #111; }
  #p2 { background: #0a080d; }

  .team-label {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 4px;
  }

  .games-big {
    font-size: 52px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -2px;
  }

  #p1 .games-big { color: var(--green); }
  #p2 .games-big { color: var(--amber); }

  .points-display {
    margin-top: 6px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--white);
    background: rgba(255,255,255,0.05);
    padding: 2px 8px;
    border-radius: 3px;
  }

  /* serving dot */
  .serve-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #ffff00;
    margin-top: 5px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .serve-dot.visible { opacity: 1; }

  /* ── DIVIDER LINE ── */
  #divider {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 2px;
    height: 60%;
    background: linear-gradient(to bottom, transparent, #222 30%, #222 70%, transparent);
    pointer-events: none;
    z-index: 10;
  }

  /* ── STATUS BAR ── */
  #status {
    text-align: center;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--dim);
    padding: 3px 0 4px;
    background: #0f0f18;
    border-top: 1px solid #1a1a2e;
    text-transform: uppercase;
  }

  /* ── OVERLAY (win / confirm undo) ── */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 16px;
  }
  #overlay.show { display: flex; }

  #overlay h2 {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 6px;
  }
  #overlay .big-msg {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 14px;
  }
  #overlay .big-msg.green { color: var(--green); }
  #overlay .big-msg.amber { color: var(--amber); }

  .ov-btn {
    display: block;
    width: 100%;
    padding: 10px;
    margin: 4px 0;
    border: none;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
  }
  .ov-btn.primary { background: var(--green); color: #000; font-weight: 700; }
  .ov-btn.secondary { background: #1a1a1a; color: var(--white); border: 1px solid #333; }
  .ov-btn.danger { background: var(--red); color: #fff; font-weight: 700; }

  /* ── LONG PRESS HINT ── */
  #hint {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    color: #333;
    letter-spacing: 1px;
    pointer-events: none;
    z-index: 5;
  }

  /* flash on tap */
  @keyframes flash {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
  }
  .flashing { animation: flash 0.15s ease; }
</style>
</head>
<body>
<div id="app">

  <!-- Set scores at top -->
  <div id="sets">
    <span id="sets-display" class="set-score active">SETS: 0 – 0</span>
  </div>

  <!-- Two tap panels -->
  <div id="panels" style="position:relative;">
    <div id="divider"></div>

    <div class="panel" id="p1">
      <div class="team-label">YOU</div>
      <div class="games-big" id="g1">0</div>
      <div class="points-display" id="pt1">0</div>
      <div class="serve-dot" id="sd1"></div>
    </div>

    <div class="panel" id="p2">
      <div class="team-label">THEM</div>
      <div class="games-big" id="g2">0</div>
      <div class="points-display" id="pt2">0</div>
      <div class="serve-dot" id="sd2"></div>
    </div>
  </div>

  <!-- Status -->
  <div id="status">TAP TO SCORE · HOLD TO UNDO</div>

</div>

<!-- Hint -->
<div id="hint">HOLD = UNDO · DOUBLE-HOLD = MENU</div>

<!-- Overlay -->
<div id="overlay">
  <h2 id="ov-title">SET WON</h2>
  <div class="big-msg" id="ov-msg"></div>
  <button class="ov-btn primary" id="ov-next">NEXT SET</button>
  <button class="ov-btn secondary" id="ov-undo">UNDO LAST</button>
  <button class="ov-btn danger" id="ov-reset">NEW MATCH</button>
</div>

<script>
// ── STATE ──
const POINTS = ['0','15','30','40','AD'];

let state = fresh();

function fresh() {
  return {
    pt: [0, 0],       // point index (0-4, where 4 = AD)
    games: [0, 0],
    sets: [0, 0],
    setHistory: [],   // [{g:[x,y]}]
    serving: 0,       // 0 or 1
    deuce: false,
    matchOver: false,
    history: []       // snapshots for undo
  };
}

function snapshot() {
  return JSON.parse(JSON.stringify({ pt: state.pt, games: state.games, sets: state.sets, setHistory: state.setHistory, serving: state.serving, deuce: state.deuce, matchOver: state.matchOver }));
}

// ── SCORING LOGIC ──
function scorePoint(p) {
  if (state.matchOver) return;

  state.history.push(snapshot());
  if (state.history.length > 20) state.history.shift();

  const o = 1 - p;

  if (state.deuce) {
    // Already at deuce: award advantage or win
    if (state.pt[p] === 4) {
      // they have AD, other team scores → back to deuce
      state.pt[p] = 3;
      state.pt[o] = 3;
      state.deuce = true;
    } else if (state.pt[o] === 4) {
      // opponent had AD, scorer wins game
      winGame(p);
    } else {
      // both at 3 (deuce), scorer gets AD
      state.pt[p] = 4;
    }
  } else {
    state.pt[p]++;
    if (state.pt[p] === 3 && state.pt[o] === 3) {
      state.deuce = true;
    } else if (state.pt[p] >= 4) {
      winGame(p);
    }
  }

  render();
}

function winGame(p) {
  const o = 1 - p;
  state.pt = [0, 0];
  state.deuce = false;
  state.games[p]++;

  // Check set win (first to 6, win by 2; or 7-5; tiebreak at 6-6)
  const g = state.games;
  let setWon = false;

  if (g[p] >= 6) {
    if (g[p] - g[o] >= 2) setWon = true;
    else if (g[p] === 7) setWon = true; // tiebreak won
  }

  if (setWon) {
    state.setHistory.push({ g: [...state.games] });
    state.sets[p]++;
    state.games = [0, 0];

    // Match won? Best of 3 sets
    if (state.sets[p] >= 2) {
      state.matchOver = true;
      showMatchWin(p);
      return;
    }

    showSetWin(p);
    return;
  }

  // Switch serve after each game
  state.serving = 1 - state.serving;
}

// ── RENDER ──
function render() {
  document.getElementById('g1').textContent = state.games[0];
  document.getElementById('g2').textContent = state.games[1];

  // Points
  const pt1 = state.deuce
    ? (state.pt[0] === 4 ? 'AD' : state.pt[0] === 3 ? '40' : POINTS[state.pt[0]])
    : POINTS[state.pt[0]];
  const pt2 = state.deuce
    ? (state.pt[1] === 4 ? 'AD' : state.pt[1] === 3 ? '40' : POINTS[state.pt[1]])
    : POINTS[state.pt[1]];

  document.getElementById('pt1').textContent = pt1;
  document.getElementById('pt2').textContent = pt2;

  // Serve dots
  document.getElementById('sd1').classList.toggle('visible', state.serving === 0);
  document.getElementById('sd2').classList.toggle('visible', state.serving === 1);

  // Sets display
  let setsText = 'SETS: ' + state.sets[0] + ' – ' + state.sets[1];
  if (state.setHistory.length > 0) {
    setsText += '  [';
    setsText += state.setHistory.map(s => s.g[0] + '-' + s.g[1]).join(' ');
    setsText += ']';
  }
  document.getElementById('sets-display').textContent = setsText;
}

// ── OVERLAYS ──
function showSetWin(p) {
  const names = ['YOU', 'THEM'];
  document.getElementById('ov-title').textContent = 'SET WON';
  const msg = document.getElementById('ov-msg');
  msg.textContent = names[p] + ' WIN SET';
  msg.className = 'big-msg ' + (p === 0 ? 'green' : 'amber');
  document.getElementById('ov-next').style.display = 'block';
  document.getElementById('overlay').classList.add('show');
}

function showMatchWin(p) {
  const names = ['YOU', 'THEM'];
  document.getElementById('ov-title').textContent = 'MATCH OVER';
  const msg = document.getElementById('ov-msg');
  msg.textContent = names[p] + ' WIN!';
  msg.className = 'big-msg ' + (p === 0 ? 'green' : 'amber');
  document.getElementById('ov-next').style.display = 'none';
  document.getElementById('overlay').classList.add('show');
}

function hideOverlay() {
  document.getElementById('overlay').classList.remove('show');
  render();
}

document.getElementById('ov-next').addEventListener('click', () => {
  hideOverlay();
});

document.getElementById('ov-undo').addEventListener('click', () => {
  undoLast();
  hideOverlay();
});

document.getElementById('ov-reset').addEventListener('click', () => {
  state = fresh();
  hideOverlay();
  render();
});

// ── UNDO ──
function undoLast() {
  if (state.history.length === 0) return;
  const prev = state.history.pop();
  Object.assign(state, prev);
  state.history = state.history; // keep
  render();
}

// ── TOUCH / CLICK HANDLERS ──
let holdTimer = null;
let holdCount = 0;
let lastHoldTarget = null;

function setupPanel(panelId, playerIndex) {
  const el = document.getElementById(panelId);

  el.addEventListener('click', (e) => {
    el.classList.add('flashing');
    setTimeout(() => el.classList.remove('flashing'), 150);
    scorePoint(playerIndex);
  });

  // Long press = undo
  el.addEventListener('touchstart', (e) => {
    holdTimer = setTimeout(() => {
      undoLast();
      flashStatus('UNDO');
    }, 600);
  }, { passive: true });

  el.addEventListener('touchend', () => {
    clearTimeout(holdTimer);
  });

  el.addEventListener('touchmove', () => {
    clearTimeout(holdTimer);
  }, { passive: true });
}

setupPanel('p1', 0);
setupPanel('p2', 1);

function flashStatus(msg) {
  const el = document.getElementById('status');
  el.textContent = msg;
  setTimeout(() => { el.textContent = 'TAP TO SCORE · HOLD TO UNDO'; }, 1000);
}

// Init
render();
</script>
</body>
</html>
